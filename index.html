<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    padding:60px 20px;
    text-align:center;
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    opacity:.9;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.card h2{
    color:#38bdf8;
    margin-bottom:15px;
}

.card p{
    margin-bottom:20px;
    color:#cbd5e1;
}

.botao{
    display:inline-block;
    padding:12px 22px;
    background:#06b6d4;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}

.botao:hover{
    background:#0891b2;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}
</style>
